version: "3.9"

# Production Docker Compose for Nova Reader
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  nova-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      HOST: "0.0.0.0"
      PORT: "8080"
      ENV: "production"
      DATABASE_URL: "postgres://nova:${POSTGRES_PASSWORD}@postgres:5432/nova_reader"
      REDIS_URL: "redis://redis:6379"
      QDRANT_URL: "http://qdrant:6334"
      MEILISEARCH_URL: "http://meilisearch:7700"
      NEO4J_URL: "bolt://neo4j:7687"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY}"
      DEEPSEEK_BASE_URL: "${DEEPSEEK_BASE_URL:-https://api.deepseek.com}"
      DEEPSEEK_MODEL: "${DEEPSEEK_MODEL:-deepseek-chat}"
      JWT_SECRET: "${JWT_SECRET}"
      LIBRARY_DIR: "/data/library"
      INBOX_DIR: "/data/inbox"
    volumes:
      - library-data:/data/library
      - inbox-data:/data/inbox
      - covers-data:/data/covers
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: nova_reader
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova -d nova_reader"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.11
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY}"
    volumes:
      - meili-data:/meili_data
    ports:
      - "7700:7700"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.5
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
    volumes:
      - neo4j-data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  meili-data:
  qdrant-data:
  neo4j-data:
  library-data:
  inbox-data:
  covers-data:
